# English Messages for BanHammer
prefix: "<gold>[BanHammer]</gold> "
noPermission: "<red>You don't have permission.</red>"
reloaded: "<green>Configuration reloaded.</green>"
notPlayer: "<red>Only available in-game.</red>"
noTarget: "<yellow>No player in sight!</yellow>"
cannotBan: "<red>You cannot ban this player.</red>"
given: "<green>Ban Hammer given to {player}.</green>"
cooldown: "<yellow>Wait {seconds}s.</yellow>"
bannedBroadcast: "<gold>{staff}</gold> banned <red>{victim}</red>{duration}."
bannedStaff: "<green>{victim}</green> banned{duration}."
tempBannedBroadcast: "<gold>{staff}</gold> banned <red>{victim}</red> for {duration}."
tempBannedStaff: "<green>{victim}</green> banned for {duration}."
kickedStaff: "<green>{victim}</green> kicked."
databaseDisabled: "<red>Database is not enabled.</red>"
playerNotFound: "<red>Player not found.</red>"
unbanned: "<green>{player} was unbanned.</green>"
unbanReason: "<gray>Reason: {reason}</gray>"
notBanned: "<yellow>{player} is not banned.</yellow>"

# History
historyHeader: "<gold>--- Ban History of {player} (Page {page}/{maxPages}) ---</gold>"
historyEntry: "<gray>#{id}</gray> <yellow>{type}</yellow> - <white>{reason}</white>"
historyEntryDate: "  <gray>Date: {date}</gray>"
historyEntryStaff: "  <gray>Staff: {staff}</gray>"
historyEntryExpires: "  <gray>Expires: {expires}</gray>"
historyEntryActive: "  <red>[ACTIVE]</red>"
historyEmpty: "<yellow>No entries found.</yellow>"
historyInvalidPage: "<red>Invalid page number.</red>"

# Stats
statsHeader: "<gold>--- Statistics {target} ---</gold>"
statsTotal: "<gray>Total:</gray> <white>{total} punishments</white>"
statsBans: "<gray>Bans:</gray> <white>{bans}</white>"
statsKicks: "<gray>Kicks:</gray> <white>{kicks}</white>"
statsMutes: "<gray>Mutes:</gray> <white>{mutes}</white>"
statsWarnings: "<gray>Warnings:</gray> <white>{warnings}</white>"

# Appeals
appealSubmitted: "<green>Your appeal has been submitted.</green>"
appealCooldown: "<red>You must wait {hours} more hours.</red>"
appealNoActiveBan: "<red>You don't have an active ban.</red>"
appealTooShort: "<red>The appeal text must be at least 20 characters long.</red>"
appealMaxReached: "<red>You have reached the maximum number of appeals.</red>"
appealsHeader: "<gold>--- Open Appeals ({count}) ---</gold>"
appealsEntry: "<gray>#{id}</gray> <yellow>{player}</yellow> - {text}"
appealsEntryDate: "  <gray>{date}</gray>"
appealsEmpty: "<yellow>No open appeals.</yellow>"
appealsInvalidId: "<red>Invalid appeal ID.</red>"
appealApproved: "<green>Appeal #{id} was approved.</green>"
appealDenied: "<red>Appeal #{id} was denied.</red>"
appealNotification: "<green>Your appeal was processed: {status}</green>"
appealResponse: "<gray>Response: {response}</gray>"

# Errors
errorOccurred: "<red>An error occurred.</red>"
invalidDuration: "<red>Invalid duration. Examples: 7d, 1h30m, permanent</red>"

# Mute Messages
muteChatBlocked: "<red>You are muted! Remaining time: {time}</red>"
muteCommandBlocked: "<red>You are muted and cannot use this command! Remaining time: {time}</red>"
mutedMessage: "<red>You have been muted for {duration}.\nReason: {reason}</red>"

# Jail Messages
