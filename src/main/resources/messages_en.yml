unjailed: "<green>You have been released from jail!</green>"
jailEscape: "<red>Don't try to escape!</red>"
jailNoTeleport: "<red>You cannot teleport while in jail!</red>"
jailNoCommands: "<red>You cannot use commands in jail!</red>"

# Warning Messages
warnedMessage: "<yellow>You have been warned!\nReason: {reason}</yellow>"

